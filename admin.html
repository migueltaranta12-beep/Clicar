<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - CliCar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="logo.jpg" class="logo" alt="Logo">

<h1>Panel de Administración</h1>

<p>Publicá vehículos fácilmente</p>

</header>

<main class="container">

<section class="card">

<h2>Nuevo vehículo</h2>

<form id="formAuto">

<label>Marca</label>
<input
type="text"
id="marca"
required>

<label>Modelo</label>
<input
type="text"
id="modelo"
required>

<label>Año</label>
<input
type="number"
id="anio"
required>

<label>Precio</label>
<input
type="number"
id="precio"
required>

<label>Kilómetros</label>
<input
type="number"
id="km"
required>

<label>Descripción</label>

<textarea
id="descripcion"
rows="5"></textarea>

<label>Imagen</label>

<input
type="file"
id="imagen"
accept="image/*"
required>
  <div class="preview">

<h3>Vista previa</h3>

<img
id="previewImagen"
src="https://placehold.co/700x450?text=Sin+Imagen"
alt="Vista previa">

<h2 id="previewTitulo">Marca Modelo</h2>

<p id="previewPrecio">$0</p>

<p id="previewDescripcion">
Sin descripción
</p>

</div>

<button
type="submit"
id="publicar">

🚗 Publicar Vehículo

</button>

<p id="estado"></p>

</form>
<section class="card">

<h2>Banner Principal</h2>

<form id="formBanner">

<label>Imagen del banner</label>

<input
type="file"
id="banner"
accept="image/*"
required>

<div class="preview">

<h3>Vista previa</h3>

<img
id="previewBanner"
src="https://placehold.co/1200x400?text=Banner"
alt="Vista previa Banner">

</div>

<button
type="submit"
id="subirBanner">

🖼️ Subir Banner

</button>

<p id="estadoBanner"></p>

</form>

</section>
</section>

<section class="card">

<h2>Información</h2>

<p>
Completá todos los datos del vehículo y presioná Publicar.
</p>

</section>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
