<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST SUPABASE</title>
</head>

<body>

<h2>TEST SUPABASE</h2>

<button onclick="probar()">Probar Supabase</button>

<p id="status">Listo</p>

<script>

function probar(){

const status = document.getElementById("status");

try{

if(!window.supabase){
status.innerText = "❌ SUPABASE NO CARGA";
return;
}

status.innerText = "✔ SUPABASE OK";

}catch(e){
status.innerText = "❌ ERROR: " + e.message;
}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
