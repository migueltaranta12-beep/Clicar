<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin CliCar</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .panel { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #003399; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-green { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cargar nuevo vehículo</h2>
        <input type="text" id="modelo" placeholder="Modelo del auto">
        <input type="number" id="precio" placeholder="Precio">
        <input type="text" id="foto" placeholder="Link de la imagen">
        <button class="btn-green" onclick="subirAuto()">Publicar en Catálogo</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function subirAuto() {
            const status = document.getElementById('status');
            status.innerText = "Subiendo...";
            
            const { error } = await supabase.from('Autos').insert([{ 
                Modelo: document.getElementById('modelo').value, 
                Precio: document.getElementById('precio').value, 
                Foto: document.getElementById('foto').value 
            }]);

            if (error) status.innerText = "Error: " + error.message;
            else {
                status.innerText = "¡Publicado con éxito!";
                // Limpiar campos
                document.getElementById('modelo').value = '';
                document.getElementById('precio').value = '';
                document.getElementById('foto').value = '';
            }
        }
    </script>
</body>
</html>
