<!DOCTYPE html>
<html>
<body>
    <h2>Panel Admin</h2>
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="number" id="precio" placeholder="Precio">
    <input type="text" id="foto" placeholder="Link de foto">
    <button id="btnPublicar">Publicar Auto</button>
    <p id="status"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Aquí abajo, entre las comillas, pegá tu clave 'anon' que copiaste de Supabase
        const SUPABASE_KEY = 'PEGÁ_ACÁ_TU_CLAVE_LARGA_QUE_EMPIEZA_CON_EYJ';
        const SUPABASE_URL = 'https://hvdmwzbvnrxhhhqdrck.supabase.co';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('btnPublicar').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.innerText = "Subiendo...";
            
            try {
                const modelo = document.getElementById('modelo').value;
                const precio = document.getElementById('precio').value;
                const foto = document.getElementById('foto').value;

                const { error } = await supabase.from('Autos').insert([
                    { Modelo: modelo, Precio: precio, Foto: foto }
                ]);

                if (error) throw error;
                status.innerText = "¡ÉXITO! Auto publicado.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        });
    </script>
</body>
</html>
