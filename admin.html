<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CliCar</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .panel { max-width: 500px; margin: auto; padding: 20px; }
        h2 { color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-publicar { 
            width: 100%; padding: 15px; background-color: #28a745; 
            color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Cargar nuevo vehículo</h2>
        <input type="text" id="modelo" placeholder="Modelo">
        <input type="number" id="precio" placeholder="Precio">
        <input type="file" id="foto" accept="image/*">
        <button class="btn-publicar" onclick="subirAuto()">Publicar en Catálogo</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function subirAuto() {
            alert("Subiendo...");
            
            const modelo = document.getElementById('modelo').value;
            const precio = document.getElementById('precio').value;
            // Nota: Aquí estamos enviando un texto vacío o nombre de archivo por ahora
            // porque subir imágenes reales requiere configuración de Storage en Supabase.
            
            const { data, error } = await supabase
                .from('Autos')
                .insert([{ Modelo: modelo, Precio: precio, Foto: 'pendiente' }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Publicado con éxito!");
            }
        }
    </script>
</body>
</html>
