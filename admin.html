<!DOCTYPE html>
<html>
<body>
    <h2>Panel Admin</h2>
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="number" id="precio" placeholder="Precio">
    <input type="text" id="foto" placeholder="Link de foto">
    <button id="btnPublicar" onclick="debugSubir()">Publicar Auto</button>
    <p id="status"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function debugSubir() {
            const status = document.getElementById('status');
            status.innerText = "1. Botón presionado...";
            
            try {
                if (typeof supabase === 'undefined') {
                    throw new Error("La librería de Supabase no cargó.");
                }

                status.innerText = "2. Conectando a Supabase...";
                const client = supabase.createClient(
                    'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                sb_publishable_yXKvcdmnwzVMTkP8Fz2AMg_9q0A0pKl
                );

                const modelo = document.getElementById('modelo').value;
                const precio = document.getElementById('precio').value;
                const foto = document.getElementById('foto').value;

                status.innerText = "3. Enviando datos...";
                client.from('Autos').insert([{ Modelo: modelo, Precio: precio, Foto: foto }])
                    .then(({ error }) => {
                        if (error) {
                            status.innerText = "Error: " + error.message;
                        } else {
                            status.innerText = "¡ÉXITO! Auto publicado.";
                        }
                    });
            } catch (e) {
                status.innerText = "ERROR FATAL: " + e.message;
            }
        }
    </script>
</body>
</html>
