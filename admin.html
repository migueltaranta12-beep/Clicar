<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin CliCar</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
width:100%;
max-width:400px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
background:#003399;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#002266;
}

#status{
margin-top:10px;
font-weight:bold;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="panel">

<h2>Admin CliCar</h2>

<input id="modelo" placeholder="Modelo del auto">

<input id="precio" type="number" placeholder="Precio">

<input id="foto" type="file" accept="image/*">
<button onclick="alert('FUNCIONA')">Publicar</button>

<p id="status"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
'https://hvdmwzbvnrxhhhqdrck.supabase.co',
'sb_publishable_yXKvcdmnwzVMTkP8Fz2AMg_9q0A0pKl'
);

document.getElementById("btn").onclick = async ()=>{

const status=document.getElementById("status");

const modelo=document.getElementById("modelo").value;

const precio=document.getElementById("precio").value;

const foto=document.getElementById("foto").files[0];

if(!modelo || !precio || !foto){

status.innerText="Completa todos los campos";

return;

}

status.innerText="Subiendo imagen...";

const nombre=Date.now()+"_"+foto.name;

const {error:uploadError}=await supabase.storage
.from("fotos-autos")
.upload(nombre,foto);

if(uploadError){

status.innerText=uploadError.message;

return;

}

const {data}=supabase.storage
.from("fotos-autos")
.getPublicUrl(nombre);

const {error}=await supabase
.from("Autos")
.insert([{

Modelo:modelo,

Precio:precio,

Foto:data.publicUrl

}]);

if(error){

status.innerText=error.message;

return;

}

status.innerText="✅ Publicado correctamente";

document.getElementById("modelo").value="";
document.getElementById("precio").value="";
document.getElementById("foto").value="";

};

</script>

</body>
</html>
