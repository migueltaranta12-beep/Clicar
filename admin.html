<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

  const db = getFirestore(initializeApp({
    apiKey: "AIzaSyC8YBo6ynaIdT7iRJ4fPle_5Bxkjl0_sc",
    authDomain: "clicar-627e8.firebaseapp.com",
    projectId: "clicar-627e8",
    storageBucket: "clicar-627e8.appspot.com",
    messagingSenderId: "1038883459999",
    appId: "1:1038883459999:web:d1c1db51631"
  }));
  const storage = getStorage();

  window.subirAuto = async () => {
    try {
      const modelo = document.getElementById('modelo').value;
      const precio = document.getElementById('precio').value;
      const archivo = document.getElementById('foto').files[0];
      if (!modelo || !precio || !archivo) return alert("Completa todo");
      
      alert("Subiendo...");
      const storageRef = ref(storage, 'autos/' + Date.now());
      await uploadBytes(storageRef, archivo);
      const url = await getDownloadURL(storageRef);
      await addDoc(collection(db, "autos"), { modelo, precio, foto: url });
      alert("¡ÉXITO!");
    } catch (e) { alert("ERROR: " + e.message); }
  };
</script>

<h2>Carga</h2>
<input id="modelo" placeholder="Modelo">
<input id="precio" placeholder="Precio">
<input type="file" id="foto">
<button onclick="subirAuto()">Publicar</button>
