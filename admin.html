<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin CliCar</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    padding:20px;
}

.panel{
    background:white;
    padding:20px;
    border-radius:10px;
    width:100%;
    max-width:400px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    background:#003399;
    color:white;
    border:none;
}

#status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="panel">

<h2>Admin CliCar</h2>

<input type="text" id="modelo" placeholder="Modelo">
<input type="number" id="precio" placeholder="Precio">
<input type="file" id="foto">

<button onclick="subirAuto()">Publicar</button>

<p id="status">Listo</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

console.log("ADMIN CARGADO ✔");

const supabase = window.supabase.createClient(
'https://hvdmwzbvnrxhhhqdrck.supabase.co',
'sb_publishable_yXKvcdmnwzVMTkP8Fz2AMg_9q0A0pKl'
);

async function subirAuto(){

console.log("CLICK EN PUBLICAR ✔");

const modelo = document.getElementById("modelo").value;
const precio = document.getElementById("precio").value;
const foto = document.getElementById("foto").files[0];

const status = document.getElementById("status");

if(!modelo || !precio || !foto){
status.innerText = "FALTAN DATOS ❌";
return;
}

status.innerText = "SUBIENDO...";

try {

// 1 subir imagen
const fileName = Date.now() + "_" + foto.name;

console.log("SUBIENDO IMAGEN...");

const { data, error: uploadError } = await supabase
.storage
.from("autos")
.upload(fileName, foto);

if(uploadError){
console.log("ERROR STORAGE:", uploadError);
status.innerText = "ERROR STORAGE";
return;
}

console.log("IMAGEN SUBIDA ✔");

// 2 url
const { data: urlData } = supabase
.storage
.from("autos")
.getPublicUrl(fileName);

const imageUrl = urlData.publicUrl;

console.log("URL:", imageUrl);

// 3 guardar
const { error } = await supabase
.from("Autos")
.insert([{
Modelo: modelo,
Precio: precio,
Foto: imageUrl
}]);

if(error){
console.log("ERROR DB:", error);
status.innerText = "ERROR DB";
return;
}

status.innerText = "PUBLICADO ✔";

console.log("TODO OK ✔");

} catch (err) {

console.log("ERROR GENERAL:", err);
status.innerText = "ERROR GENERAL";

}

}

</script>

</body>
</html>
