<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin | CliCar</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #003399; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cargar nuevo auto</h2>
        <input type="text" id="modelo" placeholder="Modelo del auto">
        <input type="number" id="precio" placeholder="Precio">
        <input type="text" id="foto" placeholder="Link de la foto">
        <button onclick="guardarAuto()">Guardar en CliCar</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function guardarAuto() {
            const modelo = document.getElementById('modelo').value;
            const precio = document.getElementById('precio').value;
            const foto = document.getElementById('foto').value;
            const status = document.getElementById('status');

            const { data, error } = await supabase
                .from('Autos')
                .insert([{ Modelo: modelo, Precio: precio, Foto: foto }]);

            if (error) {
                status.innerHTML = "Error: " + error.message;
            } else {
                status.innerHTML = "¡Auto guardado correctamente!";
            }
        }
    </script>
</body>
</html>
