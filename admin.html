<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel de Administración | CliCar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="logo.jpg" alt="Logo">

<h1>Panel de Administración</h1>

<p>Publicá vehículos en segundos</p>

</header>

<div class="container">

<div class="card">

<h2>Nuevo vehículo</h2>

<input
id="marca"
type="text"
placeholder="Marca">

<input
id="modelo"
type="text"
placeholder="Modelo">

<input
id="anio"
type="number"
placeholder="Año">

<input
id="precio"
type="number"
placeholder="Precio">

<input
id="km"
type="number"
placeholder="Kilómetros">

<textarea
id="descripcion"
placeholder="Descripción">
</textarea>

<input
id="imagen"
type="file"
accept="image/*">

<button id="publicar">

🚗 Publicar Vehículo

</button>

<p id="estado"></p>

</div>

<div class="card">

<h2>Vista previa</h2>

<div class="auto">

<img
id="previewImagen"
src="https://placehold.co/900x600?text=Sin+Imagen">

<div class="info">

<h2 id="previewTitulo">

Marca Modelo

</h2>

<div
class="precio"
id="previewPrecio">

$0

</div>

<p
class="descripcion"
id="previewDescripcion">

Sin descripción

</p>

</div>

</div>

</div>

</div>
<script type="module" src="script.js"></script>

</body>
</html>
