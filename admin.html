<!DOCTYPE html>
<html>
<body>
    <h2>Panel Admin</h2>
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="number" id="precio" placeholder="Precio">
    <input type="text" id="foto" placeholder="Link de foto">
    <button id="btnPublicar">Publicar Auto</button>
    <p id="status"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.getElementById('btnPublicar').addEventListener('click', async () => {
            document.getElementById('status').innerText = "Iniciando...";
            try {
                const supabase = supabase.createClient(
                    'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                    'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
                );
                
                const { data, error } = await supabase.from('Autos').insert([{ 
                    Modelo: document.getElementById('modelo').value, 
                    Precio: document.getElementById('precio').value, 
                    Foto: document.getElementById('foto').value 
                }]);

                if (error) throw error;
                document.getElementById('status').innerText = "¡Publicado!";
            } catch (e) {
                document.getElementById('status').innerText = "Error: " + e.message;
            }
        });
    </script>
</body>
</html>
