<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"class="">
    <title>CliCar | Catálogo de Vehículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logo" style="max-width: 200px; display: block; margin: 0 auto 10px auto;">

        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    </header>

    <div class="container">
        <div class="grid" id="listaAutos">
            <!-- Los autos se cargan aquí automáticamente -->
        </div>
    </div>

    <footer style="margin: 40px; text-align: center;">
        <a href="admin.html" style="color: #666; font-size: 0.8rem;">Acceso exclusivo socios</a>
    </footer>

    <script>
        const lista = document.getElementById('listaAutos');
        const autos = JSON.parse(localStorage.getItem('autosCliCar')) || [];
        
        if(autos.length === 0) {
            lista.innerHTML = '<p style="text-align:center; width:100%;">No hay vehículos cargados actualmente.</p>';
        } else {
            autos.forEach(auto => {
                lista.innerHTML += `
                    <div class="card">
                        <h3>${auto.modelo}</h3>
                        <p><strong>Precio:</strong> $${auto.precio} USD</p>
                        <p>${auto.descripcion}</p>
                        <a href="https://wa.me/549XXXXXX?text=Hola, me interesa el ${auto.modelo}" class="btn-whatsapp">Consultar por WhatsApp</a>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
