<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliCar</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        header { background: #003399; color: white; padding: 20px; }
        .card { background: white; margin: 20px auto; padding: 15px; width: 80%; max-width: 300px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="Logo" style="max-width: 150px;">
        <h1>CliCar</h1>
    </header>

    <div id="listaAutos">Cargando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('https://hvdmwzbvnrxhhhqdrck.supabase.co', 'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1');

        async function cargarAutos() {
            // Se conecta a la tabla 'Autos'
            const { data, error } = await supabase.from('Autos').select('*');
            
            if (error) {
                document.getElementById('listaAutos').innerHTML = "Error: " + error.message;
                return;
            }

            const contenedor = document.getElementById('listaAutos');
            contenedor.innerHTML = '';
            
            data.forEach(auto => {
                // AQUÍ ESTÁ EL CAMBIO: usamos 'auto.Foto' con MAYÚSCULA
                contenedor.innerHTML += `
                    <div class="card">
                        <h3>${auto.Modelo}</h3>
                        <p>Precio: ${auto.Precio} USD</p>
                        <img src="${auto.Foto}" style="width:100%;" onerror="this.style.display='none'">
                    </div>
                `;
            });
        }
        cargarAutos();
    </script>
</body>
</html>
