<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <div id="app">Conectando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Esperamos a que la página esté lista
        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            
            try {
                // Ahora inicializamos
                const supabase = supabase.createClient(
                    'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                    'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
                );
                
                app.innerHTML = "Consultando base de datos...";

                async function cargar() {
                    const { data, error } = await supabase.from('Autos').select('*');
                    if (error) {
                        app.innerHTML = "Error: " + error.message;
                    } else {
                        app.innerHTML = "¡Éxito! Autos encontrados: " + data.length;
                        console.log(data);
                    }
                }
                cargar();
            } catch (e) {
                app.innerHTML = "Error crítico: " + e.message;
            }
        });
    </script>
</body>
</html>
