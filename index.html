<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar | Catálogo de Vehículos</title>
</head>
<body>

    <header>
        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    </header>

    <div id="listaAutos">Cargando autos...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('https://hvdmwzbvnrxhhhqdrck.supabase.co', 'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1');

        async function cargarAutos() {
            const contenedor = document.getElementById('listaAutos');
            
            // Traemos los datos de la tabla 'Autos'
            const { data, error } = await supabase.from('Autos').select('*');
            
            if (error) {
                contenedor.innerHTML = "Error: " + error.message;
                return;
            }

            contenedor.innerHTML = '';
            
            data.forEach(auto => {
                // AQUÍ USAMOS LAS COLUMNAS CON MAYÚSCULA
                contenedor.innerHTML += `
                    <div class="card">
                        <h3>${auto.Modelo}</h3>
                        <p>Precio: ${auto.Precio} USD</p>
                        <img src="${auto.Foto}" style="width:200px;">
                    </div>
                `;
            });
        }
        
        cargarAutos();
    </script>
</body>
</html>
