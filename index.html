<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <div id="status">Cargando motor de conexión...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const statusDiv = document.getElementById('status');

        // Función que verifica si supabase cargó
        function verificarSupabase() {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                iniciarApp();
            } else {
                statusDiv.innerHTML = "Esperando descarga de Supabase...";
                setTimeout(verificarSupabase, 500); // Reintenta cada medio segundo
            }
        }

        async function iniciarApp() {
            try {
                statusDiv.innerHTML = "Conectado. Consultando base de datos...";
                
                const client = supabase.createClient(
                    'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                    'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
                );

                const { data, error } = await client.from('Autos').select('*');
                
                if (error) {
                    statusDiv.innerHTML = "Error BD: " + error.message;
                } else {
                    statusDiv.innerHTML = "¡ÉXITO! Autos encontrados: " + (data ? data.length : 0);
                    console.log(data);
                }
            } catch (e) {
                statusDiv.innerHTML = "Error crítico: " + e.message;
            }
        }

        // Arrancamos la verificación
        verificarSupabase();
    </script>
</body>
</html>
