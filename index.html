<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliCar | Tu próximo vehículo</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            background-color: #f0f0f0; 
        }
        /* Cabecera azul y línea roja como en 396666.png */
        .header { 
            background-color: #003399; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            border-bottom: 5px solid #cc0000; 
        }
        .logo { max-width: 250px; margin-bottom: 10px; }
        .catalogo { padding: 20px; }
        .card { 
            background: white; 
            margin-bottom: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <div class="header">
        <!-- Reemplaza el src con la URL de tu logo -->
        <img src="URL_DE_TU_LOGO_AQUI" class="logo" alt="CliCar">
        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    </div>

    <div class="catalogo" id="listaAutos">Cargando autos...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function cargarAutos() {
            const div = document.getElementById('listaAutos');
            try {
                const { data, error } = await supabase.from('Autos').select('*');
                if (error) throw error;
                
                div.innerHTML = '';
                data.forEach(auto => {
                    div.innerHTML += `
                        <div class="card">
                            <h3>${auto.Modelo}</h3>
                            <p>Precio: $${auto.Precio}</p>
                            <img src="${auto.Foto}" style="width:100%">
                        </div>
                    `;
                });
            } catch (e) {
                div.innerHTML = "Error cargando datos: " + e.message;
            }
        }
        cargarAutos();
    </script>
</body>
</html>
