<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        header { background: #003399; color: white; padding: 20px; }
        .card { background: white; margin: 20px auto; padding: 15px; border-radius: 8px; max-width: 300px; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="Logo" style="max-width: 150px;">
        <h1>CliCar</h1>
    </header>

    <div id="listaAutos">Cargando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function cargarAutos() {
            const contenedor = document.getElementById('listaAutos');
            const { data, error } = await supabase.from('Autos').select('*');
            
            if (error) {
                contenedor.innerHTML = "Error al cargar: " + error.message;
                return;
            }

            contenedor.innerHTML = '';
            data.forEach(auto => {
                contenedor.innerHTML += `<div class="card"><h3>${auto.Modelo}</h3><p>$${auto.Precio}</p></div>`;
            });
        }
        cargarAutos();
    </script>
</body>
</html>
