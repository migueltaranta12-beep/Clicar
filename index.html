<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliCar | Catálogo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; }
        header { background: #003399; color: white; padding: 20px; }
        header img { max-width: 150px; margin: 0 auto 10px; display: block; }
        .card { background: white; margin: 20px auto; padding: 15px; width: 80%; max-width: 300px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .auto-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="Logo CliCar">
        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    </header>

    <div id="listaAutos">Cargando autos...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function cargarAutos() {
            const contenedor = document.getElementById('listaAutos');
            try {
                const { data, error } = await supabase.from('Autos').select('*');
                
                if (error) throw error;

                contenedor.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach(auto => {
                        contenedor.innerHTML += `
                            <div class="card">
                                <h3>${auto.Modelo}</h3>
                                <p>Precio: ${auto.Precio} USD</p>
                                <img src="${auto.Foto}" class="auto-img" alt="${auto.Modelo}" onerror="this.style.display='none'">
                            </div>
                        `;
                    });
                } else {
                    contenedor.innerHTML = "<p>No hay autos disponibles.</p>";
                }
            } catch (e) {
                contenedor.innerHTML = "<p style='color:red'>Error al conectar: " + e.message + "</p>";
            }
        }
        cargarAutos();
    </script>
</body>
</html>
