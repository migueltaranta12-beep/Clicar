<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Final</title>
</head>
<body>
    <div id="status">Iniciando...</div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        // Verificamos si la librería existe tras 2 segundos
        setTimeout(() => {
            if (typeof supabase === 'undefined') {
                statusDiv.innerHTML = "❌ ERROR: No se pudo descargar la librería Supabase. ¿Tienes bloqueador de anuncios o restricción de red?";
            } else {
                statusDiv.innerHTML = "✅ Librería cargada. Intentando conectar...";
                try {
                    const client = supabase.createClient(
                        'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                        'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
                    );
                    client.from('Autos').select('*').then(({data, error}) => {
                        if(error) statusDiv.innerHTML = "❌ Error BD: " + error.message;
                        else statusDiv.innerHTML = "✅ ÉXITO! Autos: " + data.length;
                    });
                } catch(e) {
                    statusDiv.innerHTML = "❌ Error init: " + e.message;
                }
            }
        }, 2000);
    </script>
</body>
</html>
