<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <div id="status">Cargando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 2. Esperamos a que la página cargue totalmente
        window.addEventListener('load', () => {
            const statusDiv = document.getElementById('status');
            
            try {
                // 3. Inicializamos solo cuando sabemos que supabase ya existe
                const supabase = window.supabase.createClient(
                    'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                    'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
                );
                
                statusDiv.innerHTML = "Conectado. Consultando base de datos...";

                supabase.from('Autos').select('*').then(({ data, error }) => {
                    if (error) {
                        statusDiv.innerHTML = "Error BD: " + error.message;
                    } else {
                        statusDiv.innerHTML = "¡ÉXITO! Autos encontrados: " + data.length;
                        console.log(data);
                    }
                });
            } catch (e) {
                statusDiv.innerHTML = "Error crítico: " + e.message;
            }
        });
    </script>
</body>
</html>
