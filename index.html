*{

body{

header{
background:#fff;

.logo{

h1{

.catalogo{
max-width:1200px;
margin:40px auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

.info h2{

.dato{

.descripcion{
margin-top:12px;
color:#555;
line-height:1.4;
}

footer{
margin-top:40px;
padding:25px;

background:#fff;
color:#777;
}

</style>

</head>
