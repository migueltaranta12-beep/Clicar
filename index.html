<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug CliCar</title>
</head>
<body>
    <div id="app">Conectando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const app = document.getElementById('app');
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function verificar() {
            app.innerHTML = "Consultando tabla 'Autos'...";
            try {
                // Probamos traer solo 1 fila para ver si responde
                const { data, error } = await supabase.from('Autos').select('*');
                
                if (error) {
                    app.innerHTML = "Error de base de datos: " + error.message;
                } else if (data) {
                    app.innerHTML = "¡CONEXIÓN EXITOSA! Datos recibidos: " + JSON.stringify(data);
                }
            } catch (err) {
                app.innerHTML = "Error crítico de ejecución: " + err.message;
            }
        }
        verificar();
    </script>
</body>
</html>
