<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <h1>CliCar</h1>
    <div id="listaAutos">Cargando autos...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function cargarAutos() {
            const contenedor = document.getElementById('listaAutos');
            const { data, error } = await supabase.from('Autos').select('*');
            
            if (error) {
                contenedor.innerHTML = "Error: " + error.message;
                return;
            }

            contenedor.innerHTML = '';
            if (data.length === 0) {
                contenedor.innerHTML = "No hay autos.";
            } else {
                data.forEach(auto => {
                    contenedor.innerHTML += `
                        <div>
                            <h3>${auto.Modelo}</h3>
                            <p>Precio: ${auto.Precio}</p>
                            <img src="${auto.Foto}" width="200">
                        </div>
                    `;
                });
            }
        }
        cargarAutos();
    </script>
</body>
</html>
