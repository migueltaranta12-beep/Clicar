<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar | Catálogo de Vehículos</title>
    <style>
        :root { --azul: #003399; --verde: #25d366; --blanco: #ffffff; }
        body { background: #f4f4f4; font-family: sans-serif; text-align: center; }
        .card { background: var(--blanco); padding: 20px; border-radius: 12px; margin: 20px; display: inline-block; width: 300px; text-align: left; }
        .btn-whatsapp { display: block; margin-top: 15px; padding: 12px; background: var(--verde); color: var(--blanco); text-decoration: none; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    </header>

    <div id="listaAutos"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hvdmwzbvnrxhhhqdrck.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarAutos() {
            const { data, error } = await supabase.from('Autos').select('*');
            if (error) { console.error("Error:", error); return; }

            const contenedor = document.getElementById('listaAutos');
            contenedor.innerHTML = '';

            data.forEach(auto => {
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="${auto.Foto}" style="width:100%; border-radius: 8px;">
                        <h3>${auto.Modelo}</h3>
                        <p><strong>Precio:</strong> ${auto.Precio} USD</p>
                        <a href="https://wa.me/5493510000000?text=Hola, me interesa el ${auto.Modelo}" class="btn-whatsapp">Contactar</a>
                    </div>
                `;
            });
        }
        cargarAutos();
    </script>
</body>
</html>
