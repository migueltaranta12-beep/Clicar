<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <div id="status">Cargando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js"></script>
    
    <script>
        // Verificamos si la librería cargó
        if (typeof supabase === 'undefined') {
            document.getElementById('status').innerHTML = "Error: La librería de Supabase no cargó.";
        } else {
            const status = document.getElementById('status');
            const supabaseClient = supabase.createClient(
                'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
            );
            
            supabaseClient.from('Autos').select('*').then(({ data, error }) => {
                if (error) status.innerHTML = "Error BD: " + error.message;
                else status.innerHTML = "¡Conectado! Autos: " + data.length;
            });
        }
    </script>
</body>
</html>
