<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CliCar | Catálogo</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ffffff;
    text-align:center;
}

header{
    background:#ffffff;
    padding:30px 20px;
}

.logo{
    width:220px;
    max-width:90%;
}

.catalogo{
    padding:20px;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:15px;
    margin:20px auto;
    max-width:340px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    color:#003399;
}

.card p{
    color:#cc0000;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<header>

<img src="https://github.com/migueltaranta12-beep/Clicar/blob/main/logo.jpg?raw=true" class="logo">

</header>

<div id="listaAutos" class="catalogo">
Cargando catálogo...
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
'https://hvdmwzbvnrxhhhqdrck.supabase.co',
'sb_publishable_yXKvcdmnwzVMTkP8Fz2AMg_9q0A0pKl'
);

async function cargarAutos(){

const contenedor = document.getElementById("listaAutos");

const { data, error } = await supabase
.from("Autos")
.select("*");

if(error){
contenedor.innerHTML =
"<h2 style='color:red'>" + error.message + "</h2>";
return;
}

contenedor.innerHTML = "";

data.forEach(auto=>{
contenedor.innerHTML += `
<div class="card">
<img src="${auto.Foto}">
<h3>${auto.Modelo}</h3>
<p>$${auto.Precio}</p>
</div>
`;
});

}

cargarAutos();

</script>

</body>
</html>
