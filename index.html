<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliCar | Catálogo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; margin: 20px auto; padding: 15px; width: 90%; max-width: 300px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .auto-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>CliCar</h1>
    <div id="listaAutos">Cargando autos...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function cargarAutos() {
            const contenedor = document.getElementById('listaAutos');
            const { data, error } = await supabase.from('Autos').select('*');
            
            if (error) {
                contenedor.innerHTML = "Error BD: " + error.message;
                return;
            }
            
            contenedor.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(auto => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <h3>${auto.Modelo || 'Sin nombre'}</h3>
                            <p>Precio: ${auto.Precio || '0'} USD</p>
                            <img src="${auto.Foto}" class="auto-img" alt="Auto" onerror="this.style.display='none'">
                        </div>
                    `;
                });
            } else {
                contenedor.innerHTML = "<p>No hay autos aún.</p>";
            }
        }
        cargarAutos();
    </script>
</body>
</html>
