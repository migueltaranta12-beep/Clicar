<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar | Catálogo</title>
</head>
<body>
    <h1>CliCar</h1>
    <div id="listaAutos">Iniciando conexión...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
            'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
        );

        async function probarConexion() {
            const contenedor = document.getElementById('listaAutos');
            try {
                // Hacemos una consulta simple
                const { data, error } = await supabase.from('Autos').select('*');
                
                if (error) {
                    contenedor.innerHTML = "ERROR DE SUPABASE: " + error.message;
                    return;
                }
                
                if (data.length === 0) {
                    contenedor.innerHTML = "La tabla está vacía.";
                    return;
                }

                contenedor.innerHTML = "¡Conectado! Autos encontrados: " + data.length;
            } catch (err) {
                contenedor.innerHTML = "ERROR CRÍTICO: " + err.message;
            }
        }
        probarConexion();
    </script>
</body>
</html>
