<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CliCar</title>
</head>
<body>
    <div id="app">Cargando aplicación...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const app = document.getElementById('app');
        
        try {
            const supabase = supabase.createClient(
                'https://hvdmwzbvnrxhhhqdrck.supabase.co', 
                'Sb_publishable_yKXvcdmnwzVMTkPBFzAWg_9q0A0pK1'
            );
            
            app.innerHTML = "Conectando a base de datos...";

            async function cargar() {
                const { data, error } = await supabase.from('Autos').select('*');
                if (error) {
                    app.innerHTML = "Error: " + error.message;
                } else {
                    app.innerHTML = "Éxito. Se encontraron " + data.length + " autos.";
                    console.log(data);
                }
            }
            cargar();
        } catch (e) {
            app.innerHTML = "Error fatal: " + e.message;
        }
    </script>
</body>
</html>
