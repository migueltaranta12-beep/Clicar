<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliCar | Catálogo de Vehículos</title>
    <style>
        :root { --azul: #003399; --rojo: #E30613; --verde: #25d366; --blanco: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f4f4; color: #333; line-height: 1.6; }
        header { background: var(--azul); color: var(--blanco); padding: 2rem; text-align: center; border-bottom: 5px solid var(--rojo); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--blanco); padding: 20px; border-radius: 12px; border-top: 5px solid var(--rojo); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h3 { color: var(--azul); margin-bottom: 10px; }
        .btn-whatsapp { display: block; margin-top: 15px; padding: 12px; background: var(--verde); color: var(--blanco); text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <img src="logo.jpg" alt="Logo" style="max-width: 200px; display: block; margin: 0 auto 10px auto;">
        <h1>CliCar</h1>
        <p>Tu próximo vehículo está aquí</p>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8YBo6ynaldT7iRJ4fPLe_5Bxkj1o9_sc",
        authDomain: "clicar-627e8.firebaseapp.com",
        projectId: "clicar-627e8",
        storageBucket: "clicar-627e8.appspot.com",
        messagingSenderId: "1038834599999",
        appId: "1:1038834599999:web:d1c1db51631"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lista = document.getElementById('listaAutos');

    onSnapshot(collection(db, "autos"), (snapshot) => {
        lista.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const auto = doc.data();
            lista.innerHTML += `
                <div class="card">
                    <h3>${auto.modelo}</h3>
                    <p><strong>Precio:</strong> ${auto.precio} USD</p>
                    <a href="https://wa.me/5493510000000?text=Hola, me interesa el ${auto.modelo}" class="btn-whatsapp">Consultar</a>
                </div>`;
        });
    });
    </script>
</body>
</html>
