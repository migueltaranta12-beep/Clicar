<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CliCar</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#00385c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2{
text-align:center;
margin-bottom:20px;
color:#00385c;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Panel CliCar</h2>

<input
id="email"
type="email"
placeholder="Correo">

<input
id="password"
type="password"
placeholder="Contraseña">

<button onclick="login()">
Ingresar
</button>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
